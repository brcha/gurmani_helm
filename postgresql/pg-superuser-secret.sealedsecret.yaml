# SealedSecret for PostgreSQL superuser credentials.
#
# DO NOT generate this file manually. Use the instructions in README.md
# to seal a Secret with kubeseal and replace this file's content.
#
# The underlying Secret must have this structure:
#
#   apiVersion: v1
#   kind: Secret
#   metadata:
#     name: pg-superuser-secret
#     namespace: postgres
#   type: kubernetes.io/basic-auth
#   stringData:
#     username: appuser
#     password: <your-strong-password>
#
# To generate the SealedSecret (requires kubeseal and cluster access):
#
#   kubectl create secret generic pg-superuser-secret \
#     --namespace postgres \
#     --from-literal=username=appuser \
#     --from-literal=password='YourStrongPassword' \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-namespace kube-system --format yaml \
#   > postgresql/pg-superuser-secret.sealedsecret.yaml
#
# Then apply:
#   kubectl apply -f postgresql/pg-superuser-secret.sealedsecret.yaml
#
# Note: pg-superuser-secret.sealedsecret.yaml is gitignored — safe to commit
# the sealed version, but keep the plaintext secret out of the repo entirely.
